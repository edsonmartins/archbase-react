name: Publish to NPM

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  publish:
    runs-on: self-hosted  # Roda na VPS usando login existente
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0

      - name: Remove local .npmrc and configure NPM registry
        run: |
          rm -f .npmrc
          pnpm config set registry https://registry.npmjs.org/
          pnpm config set @archbase:registry https://registry.npmjs.org/

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm run build:prod-only

      - name: Pack packages
        run: pnpm run pack

      - name: Publish to NPM
        run: pnpm publish -r --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Generate release notes
        id: release_notes
        run: |
          VERSION=${{ github.ref_name }}

          # Tentar obter mensagem da tag anotada
          TAG_MESSAGE=$(git tag -l --format='%(contents)' "$VERSION" 2>/dev/null || echo "")

          # Se a tag tem mensagem (é anotada), usar ela
          if [ -n "$TAG_MESSAGE" ] && [ "$TAG_MESSAGE" != "$VERSION" ]; then
            echo "Using annotated tag message"
            echo "$TAG_MESSAGE" > release_notes.md
          else
            echo "Generating release notes from commits"
            # Obter commits desde a última tag
            PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

            echo "## 🚀 Archbase React $VERSION" > release_notes.md
            echo "" >> release_notes.md

            if [ -n "$PREV_TAG" ]; then
              echo "### Mudanças desde $PREV_TAG" >> release_notes.md
              echo "" >> release_notes.md

              # Agrupar por tipo de commit
              echo "#### Performance" >> release_notes.md
              git log ${PREV_TAG}..HEAD --pretty=format:"- %s" --grep="^perf" 2>/dev/null >> release_notes.md || true
              echo "" >> release_notes.md

              echo "#### Features" >> release_notes.md
              git log ${PREV_TAG}..HEAD --pretty=format:"- %s" --grep="^feat" 2>/dev/null >> release_notes.md || true
              echo "" >> release_notes.md

              echo "#### Bug Fixes" >> release_notes.md
              git log ${PREV_TAG}..HEAD --pretty=format:"- %s" --grep="^fix" 2>/dev/null >> release_notes.md || true
              echo "" >> release_notes.md

              echo "#### Other Changes" >> release_notes.md
              git log ${PREV_TAG}..HEAD --pretty=format:"- %s" --invert-grep --grep="^perf" --grep="^feat" --grep="^fix" --grep="^chore" --grep="^Merge" 2>/dev/null >> release_notes.md || true
              echo "" >> release_notes.md
            fi
          fi

          # Adicionar seção de packages e instalação
          echo "" >> release_notes.md
          echo "### Packages" >> release_notes.md
          echo "" >> release_notes.md
          echo "- @archbase/core" >> release_notes.md
          echo "- @archbase/data" >> release_notes.md
          echo "- @archbase/components" >> release_notes.md
          echo "- @archbase/layout" >> release_notes.md
          echo "- @archbase/admin" >> release_notes.md
          echo "- @archbase/advanced" >> release_notes.md
          echo "- @archbase/security" >> release_notes.md
          echo "- @archbase/security-ui" >> release_notes.md
          echo "- @archbase/template" >> release_notes.md
          echo "- @archbase/tools" >> release_notes.md
          echo "- @archbase/feature-flags" >> release_notes.md
          echo "- @archbase/ssr" >> release_notes.md
          echo "" >> release_notes.md
          echo "### Installation" >> release_notes.md
          echo "" >> release_notes.md
          echo '```bash' >> release_notes.md
          echo "npm install @archbase/core@${VERSION#v}" >> release_notes.md
          echo '```' >> release_notes.md
          echo "" >> release_notes.md
          echo "### Documentation" >> release_notes.md
          echo "" >> release_notes.md
          echo "Visit [https://react.archbase.dev](https://react.archbase.dev) for full documentation." >> release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          body_path: release_notes.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
